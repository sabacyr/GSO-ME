project:
  type: website
  output-dir: docs
website:
  title: "Geotechnical Student Organization"
  site-url: "https://sabacyr.github.io/GSO-ME"
  favicon: Images/Logo/Diamond.png
  page-footer:
    background: "#47587f"
    foreground: "#ffffff"
    left: |
      © 2026 Geotechnical Student Organization  
      University of Maine
    
    center: |
      For website inquiries: [Saba Cyr](mailto:saba.molaei@maine.edu)
    right:
      - icon: instagram
        href: https://instagram.com/gso_umaine
      - icon: linkedin
        href: https://linkedin.com/gso-me
      - icon: github
        href: https://github.com/sabacyr
format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    include-in-header:
      - text: |
          <base href="/GSO-ME/">
          <header class="custom-navbar">
          <div class="nav-left">
            <img src="Images/Logo/Diamond.png" alt="GSO Logo" class="logo-img">
            <span class="logo-text">Geotechnical Student Organization</span>
          </div>
          <nav class="nav-right">
            <a href="index.html">
              <img src="Images/Icons/Home.png" alt="" class="nav-icon">
              <span>Home</span>
            </a>
            <div class="dropdown">
              <a href="members.html" class="dropbtn">
                <img src="Images/Icons/Members.png" alt="" class="nav-icon">
                <span>Members</span>
              </a>
              <div class="dropdown-content">
                <a href="members.html">Biography</a>
                <a href="bylaws.html">Bylaws</a>
              </div>
            </div>
            <a href="resources.html">
              <img src="Images/Icons/Resources.png" alt="" class="nav-icon">
              <span>Resources</span>
            </a>
            <div class="dropdown">
              <a href="events.html" class="dropbtn">
                <img src="Images/Icons/Events.png" alt="" class="nav-icon">
                <span>Events</span>
              </a>
              <div class="dropdown-content">
                <a href="calendar.html">Calendar</a>
                <a href="events.html">Events</a>
              </div>
            </div>
            <a href="gallery.html">
              <img src="Images/Icons/Gallery.png" alt="" class="nav-icon">
              <span>Gallery</span>
            </a>
            <a href="news.html">
              <img src="Images/Icons/News.png" alt="" class="nav-icon">
              <span>News</span>
            </a>
            <a href="donate.html">
              <img src="Images/Icons/Donate.png" alt="" class="nav-icon">
              <span>Donate</span>
            </a>
            <a href="contact.html">
              <img src="Images/Icons/Contact.png" alt="" class="nav-icon">
              <span>Contact</span>
            </a>
          </nav>
          </header>
      - text: |
          <link href="https://unpkg.com/aos@2.3.4/dist/aos.css" rel="stylesheet">
    include-after-body:
      - text: |
          <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
          <script>
            document.addEventListener("DOMContentLoaded", function () {
              AOS.init({
                duration: 1000,
                once: true
              });
            });
          </script>
      - text: |
          <script src="slideshow.js"></script>